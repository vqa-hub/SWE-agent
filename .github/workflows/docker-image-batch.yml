    steps:
      - name: Check Secrets
        run: |
          if [ -n "${{ secrets.ALIRUN_USER }}" ]; then echo "User is set"; else echo "User is EMPTY"; fi
          if [ -n "${{ secrets.ALIRUN_PWD }}" ]; then echo "Password is set"; else echo "Password is EMPTY"; fi
          
      - name: Login to Aliyun
        uses: docker/login-action@v2
        with:
          registry: crpi-xgbpniicu7dny74q.cn-hangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIRUN_USER }}
          password: ${{ secrets.ALIRUN_PWD }}

      # - name: Pull, Tag and Push
      #   run: |
      #     # 强制指定架构并拉取
      #     docker pull --platform linux/amd64 ${{ matrix.remote }}
          
      #     # 打标签并推送到阿里云 (替换为你自己的命名空间)
      #     docker tag ${{ matrix.remote }} crpi-xgbpniicu7dny74q.cn-hangzhou.personal.cr.aliyuncs.com/${{ matrix.remote }}
      #     docker push crpi-xgbpniicu7dny74q.cn-hangzhou.personal.cr.aliyuncs.com/${{ matrix.remote }}
      
      - name: Sync Image with Skopeo
        run: |
          skopeo copy --all --src-tls-verify=false \
          --src-creds "${{ secrets.DOCKERHUB_USER }}:${{ secrets.DOCKERHUB_TOKEN }}" \
          --dest-creds "${{ secrets.ALIRUN_USER }}:${{ secrets.ALIRUN_PWD }}" \
          docker://docker.io/${{ matrix.remote }} \
          docker://crpi-xgbpniicu7dny74q.cn-hangzhou.personal.cr.aliyuncs.com/${{ matrix.remote }}
