      #     docker push crpi-xgbpniicu7dny74q.cn-hangzhou.personal.cr.aliyuncs.com/${{ matrix.remote }}
      
      - name: Sync Image with Skopeo
        run: |
          skopeo copy --all --src-tls-verify=false \
          docker://docker.io/${{ matrix.remote }} \
          docker://crpi-xgbpniicu7dny74q.cn-hangzhou.personal.cr.aliyuncs.com/${{ matrix.remote }}
