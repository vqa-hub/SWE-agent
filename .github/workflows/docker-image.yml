name: Docker Image Sync

on:
  workflow_dispatch: # 允许你手动点击按钮触发同步

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 安装 mc (MinIO Client)
        run: |
          wget -O /usr/local/bin/mc https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x /usr/local/bin/mc
          mc --version
          
      - name: Login to ydy
        run: 
          mc alias set yidongyun https://eos-huhehaote-1.cmecloud.cn MKGF0ECFDCVJKGB33XPF MQbC0ZWz8bwVnN2c18UbxlMUWBzo5bnzyxPQtyJl

      - name: Pull and Push
        run: |
          # 1. 拉取指定的 x86 架构镜像
          docker pull --platform linux/amd64 lmsysorg/sglang:deepseek-v4-hopper
          
          # 2. 重新打标签 (请替换为你自己的阿里云仓库路径)
          
          # docker tag mswebench/fluent_m_fluent-bit:pr-9590 crpi-xgbpniicu7dny74q.cn-hangzhou.personal.cr.aliyuncs.com/mswebench/fluent_m_fluent-bit:pr-9590
          docker save -o deepseek-v4-hopper.tar lmsysorg/sglang:deepseek-v4-hopper

          # 传到移动云对象存储
          # mc cp deepseek-v4-hopper.tar  yidongyun/cmjt-code/
          
          # 3. 推送到阿里云
          # docker push crpi-xgbpniicu7dny74q.cn-hangzhou.personal.cr.aliyuncs.com/mswebench/fluent_m_fluent-bit:pr-9590
